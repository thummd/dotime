# ============================================================================
# DoTime benchmark suites — v2 config SKELETON.
#
# Starting point for the next suite generation. Build with the parallel,
# per-episode-deterministic v2 scheme:
#
#     python scripts/build_release.py --config scripts/release_config_v2.yaml \
#         --workers 12 --output-dir output
#
# The v2 scheme (dotime/_build.py) seeds each episode independently, so the
# output is identical regardless of --workers (recorded as scheme=v2-perepisode
# in every manifest). It is NOT bit-identical to the hosted v1.0.0 suites — v2 is
# a deliberately new generation, hence the bumped version and `-v2` suite names.
#
# After building + hosting, add the new suite names to dotime.benchmarks
# ._SUITE_REGISTRY (with hf_repo_id + Zenodo DOI) so load_benchmark resolves them.
#
# TODO(v2): fill in the actual v2 changes. Likely axes (delete what you don't use):
#   - larger graphs / longer lags (raise N_max, K_max in the prior config)
#   - more counterfactual sampling modes per suite
#   - irregular observation schedules for the continuous suite (jittered/Poisson)
#   - additional / harder identification structures
#   - rebalanced difficulty tiers
# ============================================================================

seed: 20270101          # distinct base seed for v2 (v1 used 20260719)
T: 200                  # default trajectory length

suites:

  dot-Identifiability-v2:
    version: "2.0.0"
    generator: identifiability
    T: 200
    episodes_per_structure: 1350     # ~10.8k total across 8 structures
    structures:
      rct_no_confounding:      1
      back_door:               1
      observed_confounder:     1
      mediator:                2
      front_door:              2
      confounder_mediator:     2
      instrumental_variable:   3
      unobserved_confounder:   3
      # TODO(v2): add new structures here (and their difficulty tier).

  dot-RegimeSwitch-v2:
    version: "2.0.0"
    generator: regime
    T: 200
    densities: {2: 1, 3: 2, 5: 3}    # TODO(v2): extend densities / retier as needed
    n_episodes: 10000

  dot-Continuous-v2:
    version: "2.0.0"
    generator: continuous
    T: 200
    query_offsets: [1, 2, 3, 5, 10]
    structures: [back_door, front_door, instrumental_variable]
    n_episodes: 10000
    # TODO(v2): expose irregular observation schedules (jittered / Poisson) — the
    # continuous generator already supports them; thread the choice through here.

  dot-Generic-v2:
    version: "2.0.0"
    generator: generic
    T: 200
    n_episodes: 100000               # TODO(v2): adjust training-scale size if needed
