# Read the Docs configuration for DoTime.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  # HTML (always) + a downloadable htmlzip. PDF is omitted for now: it needs a
  # full LaTeX toolchain on RTD and is prone to first-build failures with
  # mathjax/nbsphinx; re-enable `- pdf` once a PDF build is verified green.
  - htmlzip

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
